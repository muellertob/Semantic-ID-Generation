name: semantic-id-generation
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11
  - pip
  
# Data Science & Processing
  - numpy
  - pandas
  - polars
  - scikit-learn
  - scipy
  - pyarrow
  
  # NLP & Transformers
  - sentence-transformers
  - transformers
  - tokenizers
  
  # ML Utilities
  - einops
  - hyperopt
  - tqdm
  - python-dotenv
  
  # Config & Logging
  - hydra-core
  - omegaconf
  - pyyaml
  - wandb
  - torchmetrics
  
  # Testing
  - pytest
  
  # Notebooks & Analysis
  - jupyter
  - ipykernel
  - matplotlib
  - seaborn
  - marimo
  - plotly

  # Install PyTorch and related packages via pip for official wheels & cross-platform support
  - pip:
      - torch==2.12.*
      - torchvision
      - torch-geometric