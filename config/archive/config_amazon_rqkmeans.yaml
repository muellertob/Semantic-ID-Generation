# data loader configuration
data:
  dataset: "amazon"
  batch_size: 256
  normalize_data: True
  category: "beauty"

# model configuration (RQ-KMeans)
model:
  n_layers: 3              # used by train_rqkmeans
  num_codebook_layers: 3   # used by train_seq2seq; model adds 1 collision layer → item_offsets shape [4]
  codebook_clusters: 128
  n_iters: 100
  normalize_residuals: True
  # fields required by generate_model_id / wandb_init (not meaningful for RQ-KMeans)
  hidden_dimensions: []
  latent_dimension: 0
  commitment_weight: 0

# training configuration (RQ-KMeans)
train:
  seed: 10
  learning_rate: 0
  weight_decay: 0
  num_epochs: 0

# additional configuration
general:
  seed: 10
  save_model: True
  model_path: "models/rqkmeans.pt"
  output_path: "outputs/rqkmeans_semids.pt"
  plot_dir: "outputs/rqkmeans_eval_plots"
  use_wandb: True
  wandb_project_rqvae: "mt-amazon-rqvae"
  wandb_project_tiger: "mt-amazon-tiger"
  wandb_entity: "tobias-mueller99-johannes-kepler-universit-t-linz"

# seq2seq configuration (TIGER paper implementation)
seq2seq:
  d_model: 128
  d_kv: 64
  d_ff: 1024
  num_layers: 4
  num_heads: 6
  dropout: 0.1
  activation_fn: "relu"

  # optimization
  learning_rate: 5e-4
  weight_decay: 1e-6
  use_lr_scheduler: False
  batch_size: 256

  # data
  max_history_len: 20
  user_tokens: 2000

  # training loop
  #num_epochs: 2300 # ~200k steps with ~88 steps/epoch (22k users / 256 batch)
  #warmup_steps: 10000 # "0.01 for the first 10k steps"
  #num_workers: 4
